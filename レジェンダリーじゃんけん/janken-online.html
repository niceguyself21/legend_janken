<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レジェンダリーじゃんけん オンライン対戦</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --panel: #0f3460;
    --text: #e8e8f0;
    --muted: #a0a0c0;
    --accent: #ffcb3d;
    --danger: #ff5a5f;
    --win: #3ddc84;
    --common: #9aa0a6;
    --rare: #4a90e2;
    --srare: #9b59b6;
    --legend: #ffb300;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    background: linear-gradient(135deg, var(--bg), var(--bg2));
    color: var(--text); min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    max-width: 960px; margin: 0 auto; padding: 12px;
    display: flex; flex-direction: column; gap: 12px;
  }
  h1 {
    text-align: center; margin: 4px 0; font-size: 1.3em;
    letter-spacing: 0.05em; color: var(--accent);
    text-shadow: 0 0 8px rgba(255, 203, 61, 0.4);
  }
  .screen { display: none; flex-direction: column; gap: 12px; }
  .screen.active { display: flex; }
  .zone {
    background: rgba(15, 52, 96, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px; padding: 12px;
  }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; flex-wrap: wrap;
  }
  .name { font-weight: bold; font-size: 1.05em; }
  .stats { display: flex; gap: 14px; font-size: 0.9em; color: var(--muted); flex-wrap: wrap; }
  .life-wrap { flex: 1; min-width: 160px; }
  .life-bar {
    height: 14px; background: #2a2a44;
    border-radius: 999px; overflow: hidden; position: relative;
    box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.6);
  }
  .life-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--win), #7ef8a8);
    transition: width 0.5s ease; width: 100%;
  }
  .life-fill.low { background: linear-gradient(90deg, var(--danger), #ffb0b2); }
  .life-text { font-size: 0.85em; color: var(--muted); margin-top: 2px; }

  /* Title screen */
  #titleScreen { align-items: center; justify-content: center; padding-top: 40px; }
  .big-btn {
    background: var(--accent); color: #1a1a2e; border: none;
    padding: 14px 28px; font-size: 1.1em; font-weight: bold;
    border-radius: 12px; cursor: pointer; min-width: 220px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: transform 0.15s;
  }
  .big-btn:hover { transform: translateY(-2px); }
  .big-btn.secondary { background: #4a5a8a; color: var(--text); }
  .big-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-group { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .code-input {
    font-size: 1.8em; font-weight: bold; text-align: center;
    width: 160px; padding: 8px; border-radius: 10px;
    border: 2px solid var(--accent); background: #2a2a44;
    color: var(--text); letter-spacing: 0.3em;
  }
  .error { color: var(--danger); min-height: 1.2em; text-align: center; }
  .small-link { text-align: center; font-size: 0.85em; color: var(--muted); }
  .small-link a { color: var(--accent); text-decoration: none; }

  /* Waiting screen */
  #waitingScreen { align-items: center; padding-top: 30px; }
  .room-code-big {
    font-size: 3.5em; font-weight: bold; letter-spacing: 0.3em;
    color: var(--accent); text-shadow: 0 0 16px rgba(255,203,61,0.7);
    background: #0f3460; padding: 12px 28px; border-radius: 16px;
    border: 3px solid var(--accent);
  }
  .copy-note { font-size: 0.85em; color: var(--muted); }
  .spinner {
    display: inline-block; width: 18px; height: 18px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Battlefield */
  #battlefield {
    min-height: 260px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    position: relative; padding: 16px;
  }
  .cards-row {
    display: flex; justify-content: center; align-items: center;
    gap: 30px; flex-wrap: wrap;
  }
  .slot { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .slot-label { font-size: 0.85em; color: var(--muted); }
  .slot-empty {
    width: 110px; height: 160px;
    border: 2px dashed rgba(255, 255, 255, 0.15);
    border-radius: 12px; display: flex; align-items: center;
    justify-content: center; color: var(--muted); font-size: 0.85em;
  }
  .verdict {
    min-height: 60px; text-align: center;
    font-size: 1em; line-height: 1.5; color: var(--text);
  }
  .verdict .headline {
    font-size: 1.2em; font-weight: bold;
    color: var(--accent); margin-bottom: 4px;
  }
  .verdict .multi { color: #ffb0b2; }

  /* Card */
  .card {
    width: 110px; height: 160px;
    border-radius: 12px;
    background: linear-gradient(160deg, #26263f, #1a1a30);
    border: 3px solid var(--common);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 8px; position: relative; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    user-select: none;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  }
  .card.rarity-common { border-color: var(--common); }
  .card.rarity-rare   { border-color: var(--rare);  box-shadow: 0 0 10px rgba(74,144,226,0.5); }
  .card.rarity-srare  { border-color: var(--srare); box-shadow: 0 0 12px rgba(155,89,182,0.6); }
  .card.rarity-legend { border-color: var(--legend); box-shadow: 0 0 16px rgba(255,179,0,0.8); animation: legendGlow 2s infinite alternate; }
  @keyframes legendGlow {
    from { box-shadow: 0 0 10px rgba(255,179,0,0.6); }
    to   { box-shadow: 0 0 20px rgba(255,179,0,1); }
  }
  .card .hand { font-size: 2.6em; text-align: center; line-height: 1; margin-top: 4px; }
  .card .elem { font-size: 1.4em; text-align: center; }
  .card .rarity-label { font-size: 0.7em; text-align: center; color: var(--muted); letter-spacing: 0.04em; }
  .card .atk {
    position: absolute; top: 4px; right: 6px;
    background: rgba(0, 0, 0, 0.55); border-radius: 8px;
    padding: 1px 6px; font-weight: bold; font-size: 0.9em; color: var(--accent);
  }
  .hand-row {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 10px; flex-wrap: wrap;
  }
  .hand-row .card.selectable:hover:not(.disabled) {
    transform: translateY(-10px);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.7);
  }
  .card.disabled { opacity: 0.55; cursor: not-allowed; }
  .card.played-enter { animation: playEnter 0.5s ease forwards; }
  @keyframes playEnter {
    from { transform: translateY(-40px) scale(0.6); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }
  .card-back {
    width: 110px; height: 160px;
    border-radius: 12px;
    background: repeating-linear-gradient(45deg, #3a3a5e 0 10px, #2a2a44 10px 20px);
    border: 3px solid #555577;
    display: flex; align-items: center; justify-content: center;
    font-size: 2em; color: var(--accent);
    animation: playEnter 0.4s ease;
  }
  .damage-float {
    position: absolute; font-size: 2em; font-weight: bold;
    color: var(--danger); text-shadow: 0 0 6px rgba(0,0,0,0.8);
    pointer-events: none; animation: floatUp 1.2s ease forwards;
  }
  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to   { transform: translateY(-60px); opacity: 0; }
  }
  .shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
  }
  .log {
    max-height: 90px; overflow-y: auto; font-size: 0.82em;
    color: var(--muted); background: rgba(0,0,0,0.25);
    border-radius: 8px; padding: 6px 10px; margin-top: 4px;
  }
  .log div { margin: 2px 0; }

  /* Modal */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .modal.show { display: flex; }
  .modal-inner {
    background: linear-gradient(160deg, #2a2a44, #1a1a2e);
    padding: 24px 32px; border-radius: 16px; text-align: center;
    border: 2px solid var(--accent);
    box-shadow: 0 0 30px rgba(255, 203, 61, 0.4);
    max-width: 90%;
  }
  .modal-inner h2 { margin-top: 0; color: var(--accent); font-size: 1.6em; }
  .modal-inner p { color: var(--text); }
  #modalActions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }

  .disconnect-notice {
    background: rgba(255, 90, 95, 0.15);
    border: 1px solid var(--danger);
    border-radius: 10px; padding: 8px 12px; text-align: center;
    color: #ffb0b2; font-size: 0.9em;
  }
  .disconnect-notice.hidden { display: none; }
  .waiting-note { font-size: 0.9em; color: var(--muted); text-align: center; min-height: 1.2em; }
  .turn-display { font-size: 0.75em; color: var(--muted); }

  @media (max-width: 520px) {
    .card, .slot-empty, .card-back { width: 88px; height: 130px; }
    .card .hand { font-size: 2em; }
    .card .elem { font-size: 1.1em; }
    .hand-row { gap: 4px; }
    .cards-row { gap: 14px; }
    h1 { font-size: 1.1em; }
    .room-code-big { font-size: 2.5em; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- TITLE SCREEN -->
  <div id="titleScreen" class="screen active">
    <h1>⚔ レジェンダリーじゃんけん ⚔<br><span style="font-size:0.7em;">オンライン対戦</span></h1>
    <div class="btn-group">
      <button id="btnCreate" class="big-btn">🏠 部屋を作る</button>
      <button id="btnJoinOpen" class="big-btn secondary">🚪 部屋に入る</button>
      <div id="joinArea" style="display:none; flex-direction:column; gap:8px; align-items:center;">
        <input id="joinCodeInput" class="code-input" maxlength="4" inputmode="numeric" placeholder="0000">
        <div style="display:flex; gap:8px;">
          <button id="btnJoinGo" class="big-btn">参加</button>
          <button id="btnJoinCancel" class="big-btn secondary">戻る</button>
        </div>
      </div>
      <div id="titleError" class="error"></div>
    </div>
    <p class="small-link"><a href="index.html">CPU 対戦版はこちら →</a></p>
  </div>

  <!-- WAITING SCREEN -->
  <div id="waitingScreen" class="screen">
    <h1>ルームコード</h1>
    <div style="text-align:center;">
      <div id="roomCodeDisplay" class="room-code-big">----</div>
      <p class="copy-note">このコードを相手に伝えてください</p>
      <div class="btn-group">
        <button id="btnCopyCode" class="big-btn secondary">📋 コピー</button>
      </div>
      <p style="margin-top:20px;"><span class="spinner"></span> 相手の参加を待っています…</p>
      <button id="btnCancelRoom" class="big-btn secondary" style="margin-top:10px;">キャンセル</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <h1>⚔ オンライン対戦 ⚔ <span id="turnDisplay" class="turn-display"></span></h1>

    <div class="zone" id="opponentZone">
      <div class="info-row">
        <div class="name">🎮 相手 <span id="oppIdLabel" class="turn-display"></span></div>
        <div class="stats">
          <span>デッキ: <b id="oppDeck">0</b></span>
          <span>手札: <b id="oppHand">0</b></span>
        </div>
      </div>
      <div class="life-wrap">
        <div class="life-bar"><div class="life-fill" id="oppLifeFill"></div></div>
        <div class="life-text">ライフ: <span id="oppLife">0</span> / <span id="oppLifeMax">0</span></div>
      </div>
    </div>

    <div id="disconnectNotice" class="disconnect-notice hidden">
      相手が切断しました。再接続を待っています… <b id="reconnectCountdown">30</b> 秒
    </div>

    <div class="zone" id="battlefield">
      <div class="cards-row">
        <div class="slot">
          <div class="slot-label">相手</div>
          <div id="oppSlot" class="slot-empty">未使用</div>
        </div>
        <div class="slot">
          <div class="slot-label">あなた</div>
          <div id="meSlot" class="slot-empty">未使用</div>
        </div>
      </div>
      <div class="verdict" id="verdict">手札からカードを選んでください。</div>
      <div class="waiting-note" id="waitingNote"></div>
      <div class="log" id="log"></div>
    </div>

    <div class="zone" id="meZone">
      <div class="info-row">
        <div class="name">🧑 あなた <span id="meIdLabel" class="turn-display"></span></div>
        <div class="stats">
          <span>デッキ: <b id="meDeck">0</b></span>
          <span>手札: <b id="meHand">0</b></span>
        </div>
      </div>
      <div class="life-wrap">
        <div class="life-bar"><div class="life-fill" id="meLifeFill"></div></div>
        <div class="life-text">ライフ: <span id="meLife">0</span> / <span id="meLifeMax">0</span></div>
      </div>
      <div class="hand-row" id="meHandRow"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-inner">
    <h2 id="modalTitle">-</h2>
    <p id="modalBody">-</p>
    <div id="modalActions">
      <button id="modalRematch" class="big-btn">もう一度対戦</button>
      <button id="modalBackTitle" class="big-btn secondary">タイトルに戻る</button>
    </div>
    <p id="rematchStatus" class="waiting-note"></p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDyxyAzAxR-rwKesx-P8m9x_FppxF13BQg",
    authDomain: "legendjanken.firebaseapp.com",
    databaseURL: "https://legendjanken-default-rtdb.firebaseio.com",
    projectId: "legendjanken",
    storageBucket: "legendjanken.firebasestorage.app",
    messagingSenderId: "363374067141",
    appId: "1:363374067141:web:b938c823377b86a6595fac"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // =========================
  // Game constants
  // =========================
  const HANDS = ['rock', 'scissors', 'paper'];
  const HAND_LABEL = { rock: 'グー', scissors: 'チョキ', paper: 'パー' };
  const HAND_ICON  = { rock: '✊', scissors: '✌️', paper: '✋' };

  const ELEMS = ['fire', 'water', 'grass'];
  const ELEM_LABEL = { fire: '火', water: '水', grass: '草' };
  const ELEM_ICON  = { fire: '🔥', water: '💧', grass: '🌿' };

  const RARITIES = [
    { key: 'common', label: 'コモン',        atk: 1, weight: 50, cls: 'rarity-common' },
    { key: 'rare',   label: 'レア',          atk: 2, weight: 30, cls: 'rarity-rare'   },
    { key: 'srare',  label: 'スーパーレア',  atk: 3, weight: 15, cls: 'rarity-srare'  },
    { key: 'legend', label: 'レジェンダリー', atk: 4, weight: 5,  cls: 'rarity-legend' }
  ];
  const RARITY_MAP = Object.fromEntries(RARITIES.map(r => [r.key, r]));

  const INIT_LIFE = 20;
  const DECK_SIZE = 20;
  const HAND_SIZE = 5;
  const DISCONNECT_TIMEOUT_SEC = 30;
  const LS_KEY = 'jankenOnlineSession';

  // =========================
  // Local state
  // =========================
  const state = {
    screen: 'title',
    roomCode: null,
    playerId: null,       // 'player1' | 'player2'
    oppId: null,
    isHost: false,
    room: null,           // last known Firebase data
    unsubRoom: null,      // unsubscribe function
    animatedForTurn: -1,
    processingBattle: false,
    processingAdvance: false,
    processingStart: false,
    processingRematch: false,
    disconnectTimer: null,
    disconnectStart: null,
    lastStatus: null,
  };

  // =========================
  // DOM helpers
  // =========================
  const $ = (id) => document.getElementById(id);
  function showScreen(name) {
    state.screen = name;
    ['titleScreen', 'waitingScreen', 'gameScreen'].forEach(id => {
      $(id).classList.toggle('active', id === name + 'Screen');
    });
  }
  function showError(msg) { $('titleError').textContent = msg || ''; }

  // =========================
  // Card / deck generation
  // =========================
  const rand = (n) => Math.floor(Math.random() * n);

  function pickRarity() {
    const total = RARITIES.reduce((s, r) => s + r.weight, 0);
    let n = Math.random() * total;
    for (const r of RARITIES) {
      if ((n -= r.weight) < 0) return r.key;
    }
    return RARITIES[0].key;
  }
  function makeCard() {
    return {
      hand: HANDS[rand(3)],
      elem: ELEMS[rand(3)],
      rarity: pickRarity()  // store only key; Firebase-safe
    };
  }
  function generateDeck() {
    const d = [];
    for (let i = 0; i < DECK_SIZE; i++) d.push(makeCard());
    for (let i = d.length - 1; i > 0; i--) {
      const j = rand(i + 1);
      [d[i], d[j]] = [d[j], d[i]];
    }
    return d;
  }
  function cardAtk(card) { return RARITY_MAP[card.rarity].atk; }

  // =========================
  // Battle logic
  // =========================
  function jankenCompare(a, b) {
    if (a === b) return 0;
    if (a === 'rock'     && b === 'scissors') return 1;
    if (a === 'scissors' && b === 'paper')    return 1;
    if (a === 'paper'    && b === 'rock')     return 1;
    return -1;
  }
  function elemCompare(a, b) {
    if (a === b) return 0;
    if (a === 'fire'  && b === 'grass') return 1;
    if (a === 'water' && b === 'fire')  return 1;
    if (a === 'grass' && b === 'water') return 1;
    return -1;
  }
  // Returns {p1Damage, p2Damage, kind, multiplier, attacker}
  function resolveBattle(p1Card, p2Card) {
    const jk = jankenCompare(p1Card.hand, p2Card.hand);
    const out = { p1Damage: 0, p2Damage: 0, kind: '', multiplier: 1, attacker: null };
    if (jk !== 0) {
      const winner   = jk > 0 ? { who: 'player1', card: p1Card } : { who: 'player2', card: p2Card };
      const loser    = jk > 0 ? { who: 'player2', card: p2Card } : { who: 'player1', card: p1Card };
      const ec = elemCompare(winner.card.elem, loser.card.elem);
      const mul = ec > 0 ? 2 : (ec < 0 ? 0.5 : 1);
      const dmg = cardAtk(winner.card) * mul;
      out.kind = 'janken';
      out.multiplier = mul;
      out.attacker = winner.who;
      if (winner.who === 'player1') out.p2Damage = dmg; else out.p1Damage = dmg;
    } else {
      const ec = elemCompare(p1Card.elem, p2Card.elem);
      if (ec === 0) {
        out.kind = 'full_draw';
      } else if (ec > 0) {
        out.kind = 'elem'; out.attacker = 'player1';
        out.p2Damage = cardAtk(p1Card);
      } else {
        out.kind = 'elem'; out.attacker = 'player2';
        out.p1Damage = cardAtk(p2Card);
      }
    }
    return out;
  }

  // =========================
  // Session persistence
  // =========================
  function saveSession() {
    localStorage.setItem(LS_KEY, JSON.stringify({
      roomCode: state.roomCode,
      playerId: state.playerId,
      isHost: state.isHost,
    }));
  }
  function loadSession() {
    try {
      const s = localStorage.getItem(LS_KEY);
      return s ? JSON.parse(s) : null;
    } catch { return null; }
  }
  function clearSession() { localStorage.removeItem(LS_KEY); }

  // =========================
  // Firebase wiring
  // =========================
  async function generateUniqueCode() {
    for (let i = 0; i < 20; i++) {
      const code = String(1000 + Math.floor(Math.random() * 9000));
      const snap = await get(ref(db, `rooms/${code}`));
      if (!snap.exists()) return code;
    }
    throw new Error('ルームコード生成に失敗しました');
  }

  function buildInitialPlayer(connected) {
    const deck = generateDeck();
    const hand = [];
    for (let i = 0; i < HAND_SIZE && deck.length > 0; i++) hand.push(deck.pop());
    return {
      connected,
      life: INIT_LIFE,
      lifeMax: INIT_LIFE,
      deck,
      hand,
      discard: [],
      selectedCard: null,
      ready: false,
      wantRematch: false,
    };
  }

  async function createRoom() {
    showError('');
    try {
      const code = await generateUniqueCode();
      const p1 = buildInitialPlayer(true);
      const p2 = buildInitialPlayer(false);
      await set(ref(db, `rooms/${code}`), {
        status: 'waiting',
        createdAt: Date.now(),
        turn: 1,
        battleResult: null,
        winner: null,
        player1: p1,
        player2: p2,
      });
      state.roomCode = code;
      state.playerId = 'player1';
      state.oppId = 'player2';
      state.isHost = true;
      saveSession();
      setupDisconnect();
      subscribeRoom();
      $('roomCodeDisplay').textContent = code;
      showScreen('waiting');
    } catch (e) {
      console.error(e);
      showError('ルーム作成に失敗しました');
    }
  }

  async function joinRoom(code) {
    showError('');
    if (!/^\d{4}$/.test(code)) {
      showError('4桁の数字を入力してください'); return;
    }
    try {
      const snap = await get(ref(db, `rooms/${code}`));
      if (!snap.exists()) { showError('ルームが見つかりません'); return; }
      const data = snap.val();
      if (data.status === 'finished') { showError('このルームは終了しています'); return; }
      if (data.player2 && data.player2.connected) { showError('ルームは満員です'); return; }
      state.roomCode = code;
      state.playerId = 'player2';
      state.oppId = 'player1';
      state.isHost = false;
      await update(ref(db, `rooms/${code}/player2`), { connected: true });
      saveSession();
      setupDisconnect();
      subscribeRoom();
    } catch (e) {
      console.error(e);
      showError('参加に失敗しました');
    }
  }

  function setupDisconnect() {
    const connRef = ref(db, `rooms/${state.roomCode}/${state.playerId}/connected`);
    set(connRef, true);
    onDisconnect(connRef).set(false);
  }

  function subscribeRoom() {
    if (state.unsubRoom) { state.unsubRoom(); state.unsubRoom = null; }
    const roomRef = ref(db, `rooms/${state.roomCode}`);
    state.unsubRoom = onValue(roomRef, (snap) => {
      const data = snap.val();
      handleRoomUpdate(data);
    });
  }

  async function leaveRoom({ deleteRoom = false } = {}) {
    if (state.unsubRoom) { state.unsubRoom(); state.unsubRoom = null; }
    if (state.disconnectTimer) { clearInterval(state.disconnectTimer); state.disconnectTimer = null; }
    try {
      if (deleteRoom && state.roomCode) {
        await remove(ref(db, `rooms/${state.roomCode}`));
      } else if (state.roomCode && state.playerId) {
        await update(ref(db, `rooms/${state.roomCode}/${state.playerId}`), { connected: false });
      }
    } catch (e) { console.warn(e); }
    clearSession();
    resetLocalState();
    showScreen('title');
  }

  function resetLocalState() {
    state.roomCode = null;
    state.playerId = null;
    state.oppId = null;
    state.isHost = false;
    state.room = null;
    state.animatedForTurn = -1;
    state.processingBattle = false;
    state.processingAdvance = false;
    state.processingStart = false;
    state.processingRematch = false;
    state.lastStatus = null;
    $('modal').classList.remove('show');
    $('rematchStatus').textContent = '';
    $('log').innerHTML = '';
  }

  // =========================
  // Room update handler
  // =========================
  function handleRoomUpdate(data) {
    if (!data) {
      // Room was deleted
      if (state.unsubRoom) { state.unsubRoom(); state.unsubRoom = null; }
      clearSession();
      alert('ルームが削除されました。タイトルに戻ります。');
      resetLocalState();
      showScreen('title');
      return;
    }
    state.room = data;
    const prevStatus = state.lastStatus;
    state.lastStatus = data.status;

    // Host: promote waiting → playing when opponent connects
    if (state.isHost && data.status === 'waiting' && data.player2 && data.player2.connected && !state.processingStart) {
      state.processingStart = true;
      update(ref(db, `rooms/${state.roomCode}`), { status: 'playing', turn: 1 })
        .finally(() => { state.processingStart = false; });
      return;
    }

    if (data.status === 'waiting') {
      $('roomCodeDisplay').textContent = state.roomCode;
      showScreen('waiting');
      return;
    }

    if (data.status === 'playing' || data.status === 'finished') {
      if (prevStatus === 'finished' && data.status === 'playing') {
        // Rematch has started — reset local animation tracking
        state.animatedForTurn = -1;
        $('modal').classList.remove('show');
        $('log').innerHTML = '';
        resetBattlefield();
      }
      showScreen('game');
      $('meIdLabel').textContent = state.playerId === 'player1' ? '(P1 / ホスト)' : '(P2)';
      $('oppIdLabel').textContent = state.oppId === 'player1' ? '(P1 / ホスト)' : '(P2)';
      render(data);
      handleBattleAnimation(data);
      handleDisconnectWatch(data);
      if (state.isHost) hostLoop(data);
      if (data.status === 'finished') showEndModal(data);
    }
  }

  // =========================
  // Host loop — judge + advance + rematch
  // =========================
  async function hostLoop(data) {
    // Compute battle result when both have selected
    if (data.status === 'playing'
        && data.player1 && data.player2
        && data.player1.selectedCard && data.player2.selectedCard
        && !data.battleResult
        && !state.processingBattle) {
      state.processingBattle = true;
      try {
        const res = resolveBattle(data.player1.selectedCard, data.player2.selectedCard);
        await update(ref(db, `rooms/${state.roomCode}`), {
          battleResult: {
            turn: data.turn,
            p1Card: data.player1.selectedCard,
            p2Card: data.player2.selectedCard,
            p1Damage: res.p1Damage,
            p2Damage: res.p2Damage,
            kind: res.kind,
            multiplier: res.multiplier,
            attacker: res.attacker,
          }
        });
      } finally {
        state.processingBattle = false;
      }
      return;
    }

    // Advance turn when both players have ack'd the battle result
    if (data.status === 'playing'
        && data.battleResult
        && data.player1 && data.player2
        && data.player1.ready && data.player2.ready
        && !state.processingAdvance) {
      state.processingAdvance = true;
      try {
        await advanceTurn(data);
      } finally {
        state.processingAdvance = false;
      }
      return;
    }

    // Rematch when both players requested
    if (data.status === 'finished'
        && data.player1 && data.player2
        && data.player1.wantRematch && data.player2.wantRematch
        && !state.processingRematch) {
      state.processingRematch = true;
      try {
        await rebuildForRematch(data);
      } finally {
        state.processingRematch = false;
      }
    }
  }

  async function advanceTurn(data) {
    const res = data.battleResult;

    const buildNext = (pKey, opp) => {
      const cur = data[pKey] || {};
      const selectedCard = cur.selectedCard;
      const newDiscard = [...(cur.discard || [])];
      if (selectedCard) newDiscard.push(selectedCard);
      const newDeck = [...(cur.deck || [])];
      const newHand = [...(cur.hand || [])];
      if (newDeck.length > 0) newHand.push(newDeck.pop());
      const damage = pKey === 'player1' ? res.p1Damage : res.p2Damage;
      return {
        ...cur,
        life: (cur.life || 0) - damage,
        deck: newDeck,
        hand: newHand,
        discard: newDiscard,
        selectedCard: null,
        ready: false,
      };
    };

    const p1 = buildNext('player1');
    const p2 = buildNext('player2');

    const p1Dead = p1.life <= 0;
    const p2Dead = p2.life <= 0;
    const p1Out = (p1.hand?.length || 0) === 0 && (p1.deck?.length || 0) === 0;
    const p2Out = (p2.hand?.length || 0) === 0 && (p2.deck?.length || 0) === 0;
    const gameEnd = p1Dead || p2Dead || (p1Out && p2Out);

    let winner = null;
    if (gameEnd) {
      if (p1Dead && p2Dead) winner = 'draw';
      else if (p1Dead)     winner = 'player2';
      else if (p2Dead)     winner = 'player1';
      else if (p1.life > p2.life) winner = 'player1';
      else if (p2.life > p1.life) winner = 'player2';
      else winner = 'draw';
    }

    await update(ref(db, `rooms/${state.roomCode}`), {
      player1: p1,
      player2: p2,
      turn: (data.turn || 1) + 1,
      battleResult: null,
      status: gameEnd ? 'finished' : 'playing',
      winner,
    });
  }

  async function rebuildForRematch(data) {
    const p1 = buildInitialPlayer(!!(data.player1 && data.player1.connected));
    const p2 = buildInitialPlayer(!!(data.player2 && data.player2.connected));
    await update(ref(db, `rooms/${state.roomCode}`), {
      status: 'playing',
      turn: 1,
      battleResult: null,
      winner: null,
      player1: p1,
      player2: p2,
    });
  }

  // =========================
  // Rendering
  // =========================
  function cardEl(card, opts = {}) {
    const r = RARITY_MAP[card.rarity];
    const el = document.createElement('div');
    el.className = `card ${r.cls}`;
    if (opts.animate) el.classList.add('played-enter');
    el.innerHTML = `
      <div class="atk">ATK ${r.atk}</div>
      <div class="hand" title="${HAND_LABEL[card.hand]}">${HAND_ICON[card.hand]}</div>
      <div class="elem" title="${ELEM_LABEL[card.elem]}">${ELEM_ICON[card.elem]} ${ELEM_LABEL[card.elem]}</div>
      <div class="rarity-label">${r.label}</div>
    `;
    return el;
  }

  function render(data) {
    const me  = data[state.playerId]  || {};
    const opp = data[state.oppId]     || {};
    const meHand  = me.hand  || [];
    const oppHand = opp.hand || [];
    const meDeck  = me.deck  || [];
    const oppDeck = opp.deck || [];

    // Stats
    $('meLife').textContent = Math.max(0, me.life ?? 0);
    $('meLifeMax').textContent = me.lifeMax ?? INIT_LIFE;
    $('oppLife').textContent = Math.max(0, opp.life ?? 0);
    $('oppLifeMax').textContent = opp.lifeMax ?? INIT_LIFE;
    const mePct = Math.max(0, (me.life || 0) / (me.lifeMax || INIT_LIFE)) * 100;
    const oppPct = Math.max(0, (opp.life || 0) / (opp.lifeMax || INIT_LIFE)) * 100;
    $('meLifeFill').style.width = mePct + '%';
    $('oppLifeFill').style.width = oppPct + '%';
    $('meLifeFill').classList.toggle('low', mePct < 33);
    $('oppLifeFill').classList.toggle('low', oppPct < 33);
    $('meDeck').textContent = meDeck.length;
    $('meHand').textContent = meHand.length;
    $('oppDeck').textContent = oppDeck.length;
    $('oppHand').textContent = oppHand.length;
    $('turnDisplay').textContent = `ターン ${data.turn || 1}`;

    // Hand (only render when no battle active and I haven't selected yet)
    const meSelected = !!me.selectedCard;
    const oppSelected = !!opp.selectedCard;
    const battleActive = !!data.battleResult || data.status === 'finished';

    const host = $('meHandRow');
    host.innerHTML = '';
    meHand.forEach((card, idx) => {
      const el = cardEl(card);
      el.classList.add('selectable');
      if (meSelected || battleActive) el.classList.add('disabled');
      el.addEventListener('click', () => onCardClick(idx, card));
      host.appendChild(el);
    });

    // Slots — skip while battleResult is active (handleBattleAnimation manages them)
    if (!data.battleResult) {
      if (meSelected) {
        const meEl = $('meSlot');
        if (!meEl.classList.contains('card')) {
          const slot = cardEl(me.selectedCard);
          slot.id = 'meSlot';
          meEl.replaceWith(slot);
        }
      } else {
        ensureSlotEmpty('meSlot', '未使用');
      }

      if (oppSelected) {
        const oppEl = $('oppSlot');
        if (!oppEl.classList.contains('card-back')) {
          const back = document.createElement('div');
          back.className = 'card-back';
          back.id = 'oppSlot';
          back.textContent = '?';
          oppEl.replaceWith(back);
        }
      } else {
        ensureSlotEmpty('oppSlot', '未使用');
      }
    }

    // Verdict / waiting message
    if (battleActive) {
      // verdict is set by animation
    } else if (meSelected && oppSelected) {
      $('verdict').textContent = '判定中…';
      $('waitingNote').innerHTML = '<span class="spinner"></span>';
    } else if (meSelected && !oppSelected) {
      $('verdict').textContent = '相手の選択を待っています…';
      $('waitingNote').innerHTML = '<span class="spinner"></span> 待機中';
    } else if (!meSelected && oppSelected) {
      $('verdict').textContent = '相手はカードを選びました。あなたの番です。';
      $('waitingNote').textContent = '';
    } else {
      $('verdict').textContent = '手札からカードを選んでください。';
      $('waitingNote').textContent = '';
    }
  }

  function ensureSlotEmpty(id, text) {
    const el = $(id);
    if (!el) return;
    if (el.classList.contains('slot-empty')) { el.textContent = text; return; }
    const div = document.createElement('div');
    div.className = 'slot-empty';
    div.id = id;
    div.textContent = text;
    el.replaceWith(div);
  }

  function resetBattlefield() {
    ensureSlotEmpty('meSlot', '未使用');
    ensureSlotEmpty('oppSlot', '未使用');
    $('verdict').textContent = '手札からカードを選んでください。';
    $('waitingNote').textContent = '';
  }

  // =========================
  // Select card
  // =========================
  async function onCardClick(idx, card) {
    const room = state.room;
    if (!room || state.selecting) return;
    const me = room[state.playerId] || {};
    if (me.selectedCard || room.battleResult || room.status !== 'playing') return;
    state.selecting = true;
    const newHand = [...(me.hand || [])];
    newHand.splice(idx, 1);
    try {
      await update(ref(db, `rooms/${state.roomCode}/${state.playerId}`), {
        hand: newHand,
        selectedCard: card,
      });
    } catch (e) {
      console.error(e);
    } finally {
      state.selecting = false;
    }
  }

  // =========================
  // Battle animation (both clients)
  // =========================
  function handleBattleAnimation(data) {
    if (!data.battleResult) return;
    const res = data.battleResult;
    if (state.animatedForTurn === res.turn) return;
    state.animatedForTurn = res.turn;

    const myCard  = state.playerId === 'player1' ? res.p1Card : res.p2Card;
    const oppCard = state.playerId === 'player1' ? res.p2Card : res.p1Card;
    const myDmg   = state.playerId === 'player1' ? res.p1Damage : res.p2Damage;
    const oppDmg  = state.playerId === 'player1' ? res.p2Damage : res.p1Damage;

    // Replace slots with actual cards
    const meEl = cardEl(myCard, { animate: true }); meEl.id = 'meSlot';
    $('meSlot').replaceWith(meEl);
    const oppEl = cardEl(oppCard, { animate: true }); oppEl.id = 'oppSlot';
    $('oppSlot').replaceWith(oppEl);

    // Build verdict text
    const pIcon = (c) => `${HAND_ICON[c.hand]} ${ELEM_ICON[c.elem]}${RARITY_MAP[c.rarity].label}(ATK${cardAtk(c)})`;
    let headline = '', detail = '';
    const meDesc = pIcon(myCard), oppDesc = pIcon(oppCard);
    if (res.kind === 'janken') {
      const mine = res.attacker === state.playerId;
      const who = mine ? 'あなた' : '相手';
      const dmg = mine ? (state.playerId === 'player1' ? res.p2Damage : res.p1Damage)
                       : (state.playerId === 'player1' ? res.p1Damage : res.p2Damage);
      const mulText = res.multiplier === 2 ? '（こうかばつぐん ×2）'
                    : res.multiplier === 0.5 ? '（いまひとつ ×0.5）'
                    : '（等倍）';
      headline = `${who}のじゃんけん勝利！`;
      detail = `${meDesc} (あなた) vs ${oppDesc} (相手)<br>${who}が ${dmg} ダメージ <span class="multi">${mulText}</span>`;
    } else if (res.kind === 'elem') {
      const mine = res.attacker === state.playerId;
      const who = mine ? 'あなた' : '相手';
      const dmg = mine ? (state.playerId === 'player1' ? res.p2Damage : res.p1Damage)
                       : (state.playerId === 'player1' ? res.p1Damage : res.p2Damage);
      headline = `あいこ → 属性勝負！${who}が有利`;
      detail = `${meDesc} (あなた) vs ${oppDesc} (相手)<br>${who}が ${dmg} ダメージ（基礎値）`;
    } else {
      headline = `完全な引き分け`;
      detail = `${meDesc} vs ${oppDesc}<br>同じ手・同じ属性 → ダメージなし`;
    }

    setTimeout(() => {
      $('verdict').innerHTML = `<div class="headline">${headline}</div>${detail}`;
      $('waitingNote').textContent = '';
      addLog(res.turn, `${meDesc} vs ${oppDesc} → ${headline}`);
      if (myDmg > 0) showDamage($('meSlot'), myDmg);
      if (oppDmg > 0) showDamage($('oppSlot'), oppDmg);
      // After animation settles, ack with ready
      setTimeout(() => {
        update(ref(db, `rooms/${state.roomCode}/${state.playerId}`), { ready: true })
          .catch(e => console.warn(e));
      }, 1200);
    }, 500);
  }

  function showDamage(targetEl, amount) {
    if (!targetEl) return;
    const parent = $('battlefield');
    const d = document.createElement('div');
    d.className = 'damage-float';
    d.textContent = `-${amount}`;
    const rect = targetEl.getBoundingClientRect();
    const parentRect = parent.getBoundingClientRect();
    d.style.left = (rect.left - parentRect.left + rect.width / 2 - 20) + 'px';
    d.style.top  = (rect.top  - parentRect.top  + 10) + 'px';
    parent.appendChild(d);
    targetEl.classList.add('shake');
    setTimeout(() => targetEl.classList.remove('shake'), 400);
    setTimeout(() => d.remove(), 1200);
  }

  function addLog(turn, msg) {
    const log = $('log');
    const d = document.createElement('div');
    d.textContent = `T${turn}: ${msg.replace(/<[^>]+>/g, '')}`;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  // =========================
  // End / rematch
  // =========================
  function showEndModal(data) {
    const modal = $('modal');
    modal.classList.add('show');
    const w = data.winner;
    let title, body;
    if (w === 'draw') { title = '引き分け'; body = '両者が同時に決着しました。'; }
    else if (w === state.playerId) { title = '勝利！'; body = '相手を倒しました！'; }
    else { title = '敗北…'; body = '相手に敗れました。'; }
    $('modalTitle').textContent = title;
    $('modalBody').textContent = body;

    // Rematch status
    const me = data[state.playerId] || {};
    const opp = data[state.oppId] || {};
    const status = $('rematchStatus');
    if (me.wantRematch && !opp.wantRematch) status.textContent = '相手の再戦承諾を待っています…';
    else if (!me.wantRematch && opp.wantRematch) status.textContent = '相手が再戦を希望しています！';
    else status.textContent = '';
    $('modalRematch').disabled = !!me.wantRematch;
  }

  async function requestRematch() {
    try {
      await update(ref(db, `rooms/${state.roomCode}/${state.playerId}`), { wantRematch: true });
    } catch (e) { console.error(e); }
  }

  // =========================
  // Disconnect watcher
  // =========================
  function handleDisconnectWatch(data) {
    if (data.status !== 'playing') { stopDisconnectCountdown(); return; }
    const opp = data[state.oppId];
    if (!opp) return;
    if (opp.connected === false) startDisconnectCountdown();
    else stopDisconnectCountdown();
  }

  function startDisconnectCountdown() {
    if (state.disconnectTimer) return;
    state.disconnectStart = Date.now();
    $('disconnectNotice').classList.remove('hidden');
    $('reconnectCountdown').textContent = DISCONNECT_TIMEOUT_SEC;

    state.disconnectTimer = setInterval(async () => {
      const elapsed = Math.floor((Date.now() - state.disconnectStart) / 1000);
      const remaining = Math.max(0, DISCONNECT_TIMEOUT_SEC - elapsed);
      $('reconnectCountdown').textContent = remaining;
      if (remaining <= 0) {
        clearInterval(state.disconnectTimer);
        state.disconnectTimer = null;
        try {
          // Either side can declare win — first write wins, result idempotent
          await update(ref(db, `rooms/${state.roomCode}`), {
            status: 'finished',
            winner: state.playerId,
            disconnectWin: true,
          });
        } catch (e) { console.warn(e); }
      }
    }, 1000);
  }

  function stopDisconnectCountdown() {
    if (state.disconnectTimer) { clearInterval(state.disconnectTimer); state.disconnectTimer = null; }
    $('disconnectNotice').classList.add('hidden');
  }

  // =========================
  // Reconnect on page load
  // =========================
  async function tryReconnect() {
    const session = loadSession();
    if (!session) return false;
    try {
      const snap = await get(ref(db, `rooms/${session.roomCode}`));
      if (!snap.exists()) { clearSession(); return false; }
      const data = snap.val();
      if (!data[session.playerId]) { clearSession(); return false; }
      state.roomCode = session.roomCode;
      state.playerId = session.playerId;
      state.oppId = session.playerId === 'player1' ? 'player2' : 'player1';
      state.isHost = !!session.isHost;
      setupDisconnect();
      subscribeRoom();
      return true;
    } catch (e) {
      console.warn(e);
      clearSession();
      return false;
    }
  }

  // =========================
  // Event wiring
  // =========================
  $('btnCreate').addEventListener('click', () => {
    $('btnCreate').disabled = true;
    createRoom().finally(() => { $('btnCreate').disabled = false; });
  });
  $('btnJoinOpen').addEventListener('click', () => {
    $('joinArea').style.display = 'flex';
    $('joinCodeInput').focus();
  });
  $('btnJoinCancel').addEventListener('click', () => {
    $('joinArea').style.display = 'none';
    showError('');
  });
  $('btnJoinGo').addEventListener('click', () => {
    const code = $('joinCodeInput').value.trim();
    joinRoom(code);
  });
  $('joinCodeInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('btnJoinGo').click();
  });
  $('btnCopyCode').addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(state.roomCode || '');
      $('btnCopyCode').textContent = '✅ コピーしました';
      setTimeout(() => { $('btnCopyCode').textContent = '📋 コピー'; }, 1500);
    } catch {
      $('btnCopyCode').textContent = 'コピー失敗';
    }
  });
  $('btnCancelRoom').addEventListener('click', () => leaveRoom({ deleteRoom: true }));

  $('modalRematch').addEventListener('click', requestRematch);
  $('modalBackTitle').addEventListener('click', async () => {
    const status = state.room?.status;
    await leaveRoom({ deleteRoom: status === 'finished' });
  });

  window.addEventListener('beforeunload', () => {
    // onDisconnect will fire server-side, but we also try graceful cleanup
  });

  // =========================
  // Startup
  // =========================
  (async () => {
    showScreen('title');
    const ok = await tryReconnect();
    if (!ok) showScreen('title');
  })();
</script>
</body>
</html>
